apiVersion: v1
kind: Service
metadata:
  name:  {{ .Values.app.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app:  {{ .Values.app.name }}
    group: {{ .Values.app.group }}
spec:  
  selector:
    app:   {{ .Values.app.name }}
  ports:
    - protocol: TCP
      port: {{ .Values.app.port}}
      targetPort: {{ .Values.app.port }}
  type: ClusterIP