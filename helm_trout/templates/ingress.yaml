apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name:  {{ .Values.app.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app:  {{ .Values.app.name }}
    group: {{ .Values.app.group }}
  annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
      external-dns.alpha.kubernetes.io/target: "8.44.158.127"
      traefik.ingress.kubernetes.io/router.middlewares: "{{ .Release.Namespace }}-{{ .Values.app.name }}-redirect-https@kubernetescrd"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
      - {{ .Values.app.fqdn }}
      secretName: {{ .Values.app.name }}-tls
  rules:
    - host: {{ .Values.app.fqdn }}
      http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: {{ .Values.app.name }}
              port:
                number: {{ .Values.app.port}}
