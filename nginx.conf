server {
    listen       8080;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # --- security headers ---
    # The app only talks to USGS over https and loads Leaflet from unpkg/CARTO.
    # CSP is locked to exactly those origins; tighten further if you self-host Leaflet.
    add_header Content-Security-Policy "default-src 'self'; \
script-src 'self' 'unsafe-inline' https://unpkg.com; \
style-src 'self' 'unsafe-inline' https://unpkg.com; \
img-src 'self' data: https://*.basemaps.cartocdn.com https://unpkg.com; \
connect-src 'self' https://waterservices.usgs.gov; \
font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;

    # --- performance ---
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Cache HTML briefly (data is fetched client-side anyway, so HTML can be cached).
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=300";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Don't leak nginx version
    server_tokens off;
}