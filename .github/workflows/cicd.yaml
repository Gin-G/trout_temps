# This workflow checks out the most recent code, builds the static-site container
# image, and pushes it to docker.io before updating the Helm chart and pushing the
# changes back to the code repository.
name: Trout Temps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - '*.html'
      - nginx.conf
      - Dockerfile
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code repository
        uses: actions/checkout@v4
      - name: Validate HTML/JS and nginx config
        run: |
          # Fail fast on broken JS in the page scripts (no app runtime to test).
          for f in trout-temps.html detail.html; do
            node -e "const fs=require('fs');const h=fs.readFileSync('$f','utf8');const m=h.match(/<script>([\s\S]*?)<\/script>/);if(m){new Function(m[1]);}console.log('$f OK');"
          done
          # Lint nginx.conf inside the same base image we ship.
          docker run --rm -v "$PWD/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginxinc/nginx-unprivileged:1.27-alpine nginx -t

  build-image-update-helm:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write   # needed to push the values.yaml bump back
    steps:
      - name: Check out the code repository
        uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Get the current date for an image tag
        id: date
        run: echo "date=$(date +'%Y-%m-%d.%H.%M')" >> $GITHUB_OUTPUT
      - name: Build and push Trout Temps image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ncging/trout-temps:latest
            ncging/trout-temps:${{ steps.date.outputs.date }}
      - name: Update Helm chart with new image
        run: |
          sed -i -E "s|image: docker.io/ncging/trout-temps:[^[:space:]]+|image: docker.io/ncging/trout-temps:${{ steps.date.outputs.date }}|" helm_trout/values.yaml
      - name: Push changes to GitHub
        run: |
          git config --global user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git config --global user.name "$GITHUB_ACTOR"
          git commit -a -m "Image build and push successful, updated Helm chart to use new image"
          git push